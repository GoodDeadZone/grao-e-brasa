<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gestão Grão & Brasa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#161b27;--dou:#d4a84b;--car:#c8843a;--vd:#27ae60;--vm:#e74c3c;--az:#3498db;}
body{font-family:'Lora',serif;background:var(--bg);color:#dde;padding:20px}
.resumo{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.box{background:var(--bg2);padding:20px;border-radius:12px;text-align:center;border:1px solid #2a3045}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;color:white}
.card{background:var(--bg2);padding:15px;border-radius:10px;margin-bottom:10px;border-left:5px solid var(--vm)}
#st-caixa{padding:10px;border-radius:8px;text-align:center;font-weight:bold;margin-bottom:20px}
.aberto{background:rgba(39,174,96,0.1);color:var(--vd);border:1px solid var(--vd)}
.fechado{background:rgba(231,76,60,0.1);color:var(--vm);border:1px solid var(--vm)}
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:center">
    <h1 style="font-family:'Playfair Display';color:var(--dou)">Grão & Brasa Gestão</h1>
    <div id="st-caixa" class="fechado">CARREGANDO...</div>
</div>

<div style="display:flex;gap:10px;margin-bottom:25px">
    <button class="btn" style="background:var(--vd)" onclick="setCaixa(true)">🔓 ABRIR LOJA</button>
    <button class="btn" style="background:var(--vm)" onclick="setCaixa(false)">🔒 FECHAR LOJA</button>
</div>

<div class="resumo">
    <div class="box"><h4>TOTAL DO DIA</h4><h2 id="t-total" style="color:var(--vd)">R$ 0,00</h2></div>
    <div class="box"><h4>PEDIDOS ATIVOS</h4><h2 id="t-ativos">0</h2></div>
</div>

<h3>⏳ Pagamentos Pendentes</h3>
<div id="lista-p"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const app = initializeApp({databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com"});
const db = getDatabase(app);

let ativos = 0; let totalDia = 0; let cfg = {aberto:false};

onValue(ref(db, 'configuracoes/caixa'), (snap) => {
    cfg = snap.val() || {aberto:false};
    const visor = document.getElementById('st-caixa');
    visor.className = cfg.aberto ? "aberto" : "fechado";
    visor.innerText = cfg.aberto ? "🟢 RESTAURANTE ABERTO" : "🔴 RESTAURANTE FECHADO";
});

window.setCaixa = (val) => set(ref(db, 'configuracoes/caixa'), {aberto: val, data: val ? new Date().toISOString() : null});

onValue(ref(db, 'pedidos'), (snap) => {
    const dados = snap.val(); if(!dados) return;
    const list = Object.keys(dados).map(k=>({id:k,...dados[k]}));
    
    document.getElementById('lista-p').innerHTML = '';
    ativos = 0; totalDia = 0;

    list.forEach(p => {
        if(p.status === 'aguardando_pagamento') {
            document.getElementById('lista-p').innerHTML += `
                <div class="card">
                    <b>${p.mesa} - R$ ${p.total.toFixed(2)}</b><br>
                    <small>Cliente: ${p.cliente}</small>
                    <button class="btn" style="background:var(--vd);margin-top:10px" onclick="upd('${p.id}','novo')">Confirmar Recebimento</button>
                </div>`;
        }
        if(p.status !== 'cancelado' && p.status !== 'aguardando_pagamento') {
            totalDia += p.total;
            if(p.status !== 'finalizado') ativos++;
        }
    });

    document.getElementById('t-total').innerText = "R$ " + totalDia.toFixed(2).replace('.',',');
    document.getElementById('t-ativos').innerText = ativos;
});

window.upd = (id, s) => update(ref(db, 'pedidos/'+id), {status: s});
</script>
</body>
</html>
