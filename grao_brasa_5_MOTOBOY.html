<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motoboy – Grão & Brasa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#121212;--bg2:#1e1e1e;--brd:#333;--dou:#d4a84b;--car:#c8843a;--vd:#27ae60;--az:#3498db;--vm:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lora',serif;background:var(--bg);color:#eee;padding:15px}
.topbar{background:var(--bg2);padding:15px;border-radius:12px;border-bottom:3px solid var(--car);text-align:center;margin-bottom:20px}
.card-del{background:var(--bg2);border:1px solid var(--brd);padding:20px;border-radius:15px;margin-bottom:15px;border-left:6px solid var(--az)}
.bairro{font-size:1.3rem;font-weight:bold;color:var(--dou);margin-bottom:5px}
.btn-m{width:100%;padding:18px;border:none;border-radius:10px;font-weight:bold;font-size:1.1rem;cursor:pointer;margin-top:15px;color:white}
</style>
</head>
<body>

<div class="topbar">
  <h1 style="font-family:'Playfair Display';color:var(--dou)">🛵 Entregas Brasa</h1>
</div>

<div id="lista-entregas"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const app = initializeApp({
    apiKey: "AIzaSyBVZof62nwg8DSWiFGWGARbsMwh-AnVCSY",
    authDomain: "grao-e-brasa-ef12e.firebaseapp.com",
    databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com",
    projectId: "grao-e-brasa-ef12e"
});
const db = getDatabase(app);

onValue(ref(db, 'pedidos'), (snap) => {
    const dados = snap.val();
    const area = document.getElementById('lista-entregas');
    area.innerHTML = '';
    if(!dados) return;

    Object.keys(dados).forEach(k => {
        const p = dados[k];
        // Mostra se for delivery e estiver pronto ou em rota
        if(p.mesa.includes('Delivery') && (p.status === 'pronto' || p.status === 'em_rota')){
            area.innerHTML += `
                <div class="card-del" style="border-left-color: ${p.status==='pronto'?'var(--az)':'var(--vd)'}">
                    <div class="bairro">📍 ${p.cliente}</div>
                    <div style="color:#aaa;margin:10px 0">${p.obs || 'Sem observações de entrega'}</div>
                    <div style="background:#111;padding:10px;border-radius:8px">
                        <b>Receber: R$ ${p.total.toFixed(2)}</b><br>
                        <small>Pagamento via PIX confirmado</small>
                    </div>
                    ${p.status === 'pronto' ? 
                        `<button class="btn-m" style="background:var(--az)" onclick="upd('${k}','em_rota')">🏍️ SAIR PARA ENTREGA</button>` : 
                        `<button class="btn-m" style="background:var(--vd)" onclick="upd('${k}','finalizado')">✅ CONFIRMAR ENTREGUE</button>`
                    }
                </div>`;
        }
    });
});

window.upd = (id, st) => update(ref(db, 'pedidos/'+id), {status: st});
</script>
</body>
</html>
