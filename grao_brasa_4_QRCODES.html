<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>QR Codes - Grão & Brasa</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Lora', serif; background: #f5ead6; color: #3d1f0d; text-align: center; padding: 20px; }
    h1 { font-family: 'Playfair Display', serif; color: #3d1f0d; margin-bottom: 5px; }
    p { margin-bottom: 30px; opacity: 0.8; }
    
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
        gap: 25px; 
        max-width: 1000px; 
        margin: 0 auto; 
    }
    
    .card { 
        background: white; 
        border: 2px solid #c8843a; 
        padding: 20px; 
        border-radius: 15px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .card h3 { font-family: 'Playfair Display', serif; margin-bottom: 10px; color: #c8843a; }
    .qr-container { background: white; padding: 10px; border-radius: 10px; }
    .footer-text { font-size: 0.6rem; color: #888; margin-top: 15px; word-break: break-all; max-width: 180px; }
    
    /* Estilo para o QR Code de Delivery */
    .delivery-card { border: 4px solid #e74c3c; background: #fff5f5; }
    .delivery-card h3 { color: #e74c3c; }

    @media print {
        .no-print { display: none; }
        body { background: white; padding: 0; }
        .card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
    }
</style>
</head>
<body>

    <div class="no-print">
        <h1>Gerador de QR Codes</h1>
        <p>Grão & Brasa – Cozinha Mineira de Raiz</p>
        <button onclick="window.print()" style="padding: 10px 20px; background: #3d1f0d; color: #d4a84b; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 40px;">🖨️ Imprimir Códigos</button>
    </div>

    <div class="grid" id="grid">
        <div class="card delivery-card">
            <h3>🛵 Delivery</h3>
            <div id="q-delivery" class="qr-container"></div>
            <div class="footer-text">Peça de onde estiver</div>
        </div>
    </div>

<script>
    // SEU LINK NO GITHUB
    const URL_BASE = "https://gooddeadzone.github.io/grao-e-brasa/grao_brasa_1_CLIENTE.html";
    
    // Gerar QR do Delivery
    new QRCode(document.getElementById('q-delivery'), {
        text: URL_BASE + "?mesa=Delivery",
        width: 160,
        height: 160,
        colorDark : "#e74c3c"
    });

    // Gerar QR das Mesas (1 a 12)
    for(let i=1; i<=12; i++){
        const container = document.getElementById('grid');
        const card = document.createElement('div');
        card.className = 'card';
        
        const mesaId = "Mesa_" + i;
        const finalURL = URL_BASE + "?mesa=" + mesaId;

        card.innerHTML = `<h3>Mesa ${i}</h3><div id="q${i}" class="qr-container"></div><div class="footer-text">${finalURL}</div>`;
        container.appendChild(card);
        
        new QRCode(document.getElementById('q'+i), {
            text: finalURL,
            width: 160,
            height: 160,
            colorDark : "#3d1f0d"
        });
    }
</script>
</body>
</html>
