<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grão & Brasa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lora&display=swap" rel="stylesheet">
<style>
:root{--m:#3d1f0d;--car:#c8843a;--dou:#d4a84b;--cr:#f5ead6;--vd:#27ae60;}
body{font-family:'Lora',serif;background:var(--cr);color:var(--m);margin:0}
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}
.topbar{background:var(--m);width:100%;padding:15px;position:fixed;top:0;display:flex;justify-content:space-between;z-index:100}
.menu-body{padding:80px 15px 120px 15px;width:100%;max-width:500px;box-sizing:border-box}
.item-card{background:white;padding:15px;border-radius:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.btn-add{background:var(--m);color:white;border:none;padding:10px 20px;border-radius:10px;font-weight:bold}
.f-bar{position:fixed;bottom:0;width:100%;padding:15px;background:white;border-top:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;box-sizing:border-box}
</style>
</head>
<body>

<div id="s-loading" class="screen active" style="background:var(--m);color:var(--dou)">
    <h1 style="font-family:'Playfair Display'">Grão & Brasa</h1>
    <p>Carregando sistema...</p>
</div>

<div id="s-login" class="screen">
    <div style="text-align:center;padding:20px;background:white;border-radius:20px;width:85%">
        <h2 style="font-family:'Playfair Display'">Bem-vindo</h2>
        <input type="text" id="in-name" placeholder="Seu nome" style="width:90%;padding:15px;border-radius:10px;border:1px solid #ccc">
        <button onclick="doLogin()" style="width:90%;padding:15px;background:var(--m);color:var(--dou);border:none;border-radius:10px;margin-top:15px;font-weight:bold">Entrar no Cardápio</button>
    </div>
</div>

<div id="s-menu" class="screen" style="justify-content:flex-start">
    <div class="topbar">
        <span style="color:var(--dou);font-family:'Playfair Display';font-weight:bold">Grão & Brasa</span>
        <span id="mesa-label" style="color:white;font-size:0.8rem">Mesa --</span>
    </div>
    <div class="menu-body" id="lista-itens">
        </div>
    <div class="f-bar">
        <b id="txt-total">Total: R$ 0,00</b>
        <button onclick="finalizar()" style="background:var(--vd);color:white;border:none;padding:12px 20px;border-radius:10px;font-weight:bold">Pedir Agora</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const config = { databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com" };
const app = initializeApp(config);
const db = getDatabase(app);

let cart = []; let total = 0;
const mesa = new URLSearchParams(window.location.search).get('mesa') || 'Mesa_Balcao';

const produtos = [
    {n: "PF Simples", p: 20.00}, {n: "PF Completo", p: 28.00},
    {n: "Pudim de Leite", p: 8.00}, {n: "Bolo de Fubá", p: 7.00},
    {n: "Suco Natural", p: 7.00}, {n: "Limonada Suíça", p: 10.00},
    {n: "Refrigerante Lata", p: 5.00}, {n: "Água Mineral", p: 3.00}
];

window.doLogin = () => {
    if(!document.getElementById('in-name').value) return alert("Digite seu nome!");
    document.getElementById('s-login').classList.remove('active');
    document.getElementById('s-menu').classList.add('active');
    document.getElementById('mesa-label').innerText = "Mesa: " + mesa.split('_')[1];
    render();
};

function render() {
    document.getElementById('lista-itens').innerHTML = produtos.map(i => `
        <div class="item-card">
            <div><b>${i.n}</b><br><small>R$ ${i.p.toFixed(2)}</small></div>
            <button class="btn-add" onclick="add('${i.n}', ${i.p})">+</button>
        </div>
    `).join('');
}

window.add = (n, p) => {
    cart.push({nome: n, preco: p});
    total += p;
    document.getElementById('txt-total').innerText = "Total: R$ " + total.toFixed(2).replace('.',',');
};

window.finalizar = async () => {
    if(cart.length === 0) return alert("Carrinho vazio!");
    try {
        const pRef = push(ref(db, 'pedidos'));
        await set(pRef, { cliente: document.getElementById('in-name').value, mesa: mesa, itens: cart, total: total, status: 'aguardando_pagamento', hora: new Date().toISOString() });
        alert("Pedido enviado com sucesso!");
        cart = []; total = 0; document.getElementById('txt-total').innerText = "Total: R$ 0,00";
    } catch(e) { alert("Erro ao conectar com o banco de dados!"); }
};

// FORÇAR SAÍDA DO LOADING APÓS 2 SEGUNDOS
setTimeout(() => {
    document.getElementById('s-loading').classList.remove('active');
    document.getElementById('s-login').classList.add('active');
}, 2000);
</script>
</body>
</html>
