<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Grão & Brasa – Cardápio Mineiro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--m:#3d1f0d;--car:#c8843a;--dou:#d4a84b;--cr:#f5ead6;--vd:#27ae60;--vm:#e74c3c;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Lora',serif;background:var(--cr);color:var(--m);min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* TELAS INICIAIS */
#s-loading{background:var(--m);align-items:center;justify-content:center;color:var(--dou);text-align:center}
#s-login{background:var(--m);align-items:center;justify-content:center;padding:30px}

/* HEADER E ABAS */
.topbar{background:var(--m);padding:13px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.delivery-tabs{display:flex;background:var(--m);margin:15px;border-radius:12px;overflow:hidden;border:1px solid var(--car)}
.tab-btn{flex:1;padding:12px;border:none;background:var(--m);color:white;font-weight:bold;cursor:pointer}
.tab-btn.active{background:var(--car)}

/* CARDÁPIO */
.menu-body{padding:0 16px 180px 16px}
.section-title{font-family:'Playfair Display';font-size:1.4rem;margin:25px 0 10px;border-bottom:2px solid var(--car);display:inline-block}
.item-card{background:white;border-radius:18px;padding:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
.item-info{flex:1;padding-right:10px}
.item-name{font-weight:bold;font-size:1.1rem;margin-bottom:3px}
.item-desc{font-size:0.75rem;color:#666;line-height:1.2}
.item-price{color:var(--car);font-weight:bold;display:block;margin-top:5px}
.btn-add{background:var(--m);color:white;border:none;padding:10px 18px;border-radius:10px;font-weight:bold;cursor:pointer}

/* RODAPÉ FIXO */
.f-bar{position:fixed;bottom:0;left:0;right:0;padding:16px;background:linear-gradient(to top, var(--cr) 80%, transparent);z-index:150}
.btn-main{background:var(--m);color:var(--dou);border:none;padding:18px;width:100%;border-radius:16px;font-family:'Playfair Display',serif;font-weight:900;font-size:1.1rem;display:flex;justify-content:space-between}
.btn-main:disabled{background:#999;opacity:0.6}
</style>
</head>
<body>

<div id="s-loading" class="screen active">
  <h1 style="font-family:'Playfair Display';font-size:2.5rem">Grão & Brasa</h1>
  <p style="letter-spacing:3px;font-size:.7rem;margin-top:10px;opacity:.7">COZINHA MINEIRA DE RAIZ...</p>
</div>

<div id="s-login" class="screen">
  <div style="background:var(--cr);padding:40px 30px;border-radius:24px;text-align:center;width:100%;max-width:360px">
    <h2 style="font-family:'Playfair Display';margin-bottom:20px">Identifique-se</h2>
    <input type="text" id="in-name" placeholder="Seu nome" style="width:100%;padding:15px;border-radius:12px;border:1px solid #ddd;outline:none">
    <button onclick="doLogin()" style="width:100%;padding:15px;background:var(--m);color:var(--dou);border:none;border-radius:12px;font-weight:700;margin-top:15px">Entrar no Cardápio</button>
  </div>
</div>

<div id="s-menu" class="screen">
  <div class="topbar">
    <div style="font-family:'Playfair Display';color:var(--dou);font-weight:900">Grão & Brasa</div>
    <div id="mesa-label" style="color:white;font-size:.8rem;background:var(--car);padding:4px 10px;border-radius:8px">Mesa --</div>
  </div>

  <div class="delivery-tabs">
    <button class="tab-btn active" id="btn-local" onclick="toggleTipo('local')">No Restaurante</button>
    <button class="tab-btn" id="btn-delivery" onclick="toggleTipo('delivery')">Delivery</button>
  </div>

  <div class="menu-body">
    <div id="form-delivery" style="display:none;background:white;padding:15px;border-radius:15px;margin-bottom:15px;border:1px solid #e8d5b0">
        <input type="text" id="del-end" placeholder="Endereço Completo para Entrega" style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc">
    </div>

    <div style="background:var(--m);color:var(--cr);padding:15px;border-radius:12px;font-size:0.8rem;margin-bottom:20px">
        <b>🥘 Todo PF acompanha:</b> Arroz (branco ou pequi), Feijão (tropeiro ou tutu), Couve com alho, Farofa de torresmo e Salada.
    </div>

    <div class="section-title">Pratos do Dia</div>
    <div id="lista-pfs"></div>

    <div class="section-title">Doces & Sobremesas</div>
    <div id="lista-doces"></div>

    <div class="section-title">Sucos & Bebidas</div>
    <div id="lista-bebidas"></div>

    <div style="background:white;padding:15px;border-radius:15px;margin-top:20px;border:1px solid #ddd">
        <label style="font-weight:bold;font-size:0.8rem">Observações (Carne escolhida, sem cebola...):</label>
        <textarea id="obs" placeholder="Escreva aqui..." style="width:100%;height:60px;padding:10px;border-radius:8px;border:1px solid #ccc;margin-top:5px;font-family:inherit"></textarea>
        
        <label style="font-weight:bold;font-size:0.8rem;margin-top:10px;display:block">Forma de Pagamento:</label>
        <select id="sel-pag" style="width:100%;padding:12px;margin-top:5px;border-radius:8px;border:1px solid #ccc">
            <option value="pix">PIX (Pagar agora)</option>
            <option value="cartao">Cartão (Levamos a maquininha)</option>
            <option value="dinheiro">Dinheiro</option>
        </select>
    </div>
    <div id="status-aviso" style="margin-top:20px;padding:15px;border-radius:12px;text-align:center;display:none;color:white;font-weight:bold"></div>
  </div>

  <div class="f-bar">
    <button class="btn-main" id="btn-finalizar" onclick="finalizar()">
        <span>Finalizar Pedido</span>
        <span id="txt-total">R$ 0,00</span>
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const app = initializeApp({databaseURL: "https://grao-e-brasa-ef12e-default-rtdb.firebaseio.com"});
const db = getDatabase(app);

const TAXA = 7.00;
let cart = []; let subtotal = 0; let tipoPedido = 'local'; let aberto = false;
const mesa = new URLSearchParams(window.location.search).get('mesa') || 'Mesa_Balcao';

const menuData = {
    pfs: [
        {n:"PF Simples (1 carne)", p:20.00, d:"Acompanha arroz, feijão, couve, farofa e salada "},
        {n:"PF Completo (2 carnes)", p:28.00, d:"Acompanha arroz, feijão, couve, farofa e salada "}
    ],
    doces: [
        {n:"Pudim de Leite Mineiro", p:8.00, d:"Receita tradicional e cremosa "},
        {n:"Doce de Leite c/ Queijo", p:9.00, d:"Clássico mineiro com queijo meia cura "},
        {n:"Canjica c/ Amendoim", p:8.00, d:"Milho branco com amendoim torrado "},
        {n:"Bolo de Fubá c/ Goiabada", p:7.00, d:"Quentinho com cobertura de goiabada cascão "},
        {n:"Arroz Doce Cremoso", p:7.00, d:"Com leite condensado e canela "},
        {n:"Cocada Mineira", p:6.00, d:"Cocada mole, receita de vó "}
    ],
    bebidas: [
        {n:"Suco Natural 400ml", p:7.00, d:"Laranja, limão, abacaxi, goiaba, manga ou maracujá "},
        {n:"Vitamina 400ml", p:9.00, d:"Banana com leite, mamão ou abacate com mel "},
        {n:"Café Coado na Hora", p:4.00, d:"Café mineiro em coador de pano "},
        {n:"Café com Leite", p:6.00, d:"Quente ou frio "},
        {n:"Limonada Suíça", p:10.00, d:"Refrescante com leite condensado "},
        {n:"Refrigerante Lata", p:5.00, d:"Diversos sabores "},
        {n:"Água Mineral", p:3.00, d:"Com ou sem gás "}
    ]
};

function render() {
    const r = (l, id) => document.getElementById(id).innerHTML = l.map(it => `
        <div class="item-card">
            <div class="item-info">
                <div class="item-name">${it.n}</div>
                <div class="item-desc">${it.d}</div>
                <span class="item-price">R$ ${it.p.toFixed(2)}</span>
            </div>
            <button class="btn-add" onclick="add('${it.n}', ${it.p})">+</button>
        </div>`).join('');
    r(menuData.pfs, 'lista-pfs');
    r(menuData.doces, 'lista-doces');
    r(menuData.bebidas, 'lista-bebidas');
}

onValue(ref(db, 'configuracoes/caixa'), (snap) => {
    aberto = snap.val()?.aberto || false;
    document.getElementById('btn-finalizar').disabled = !aberto;
    const s = document.getElementById('status-aviso');
    if(!aberto) {
        s.style.display='block'; s.style.background='#e74c3c'; s.innerText="🔴 Restaurante Fechado no momento";
    } else s.style.display='none';
});

window.doLogin = () => {
    if(!document.getElementById('in-name').value) return alert("Diga o seu nome!");
    document.getElementById('s-login').style.display='none';
    document.getElementById('s-menu').style.display='flex';
    document.getElementById('mesa-label').innerText = "Mesa: " + mesa.split('_')[1];
    render();
};

window.toggleTipo = (t) => {
    tipoPedido = t;
    document.getElementById('btn-local').classList.toggle('active', t==='local');
    document.getElementById('btn-delivery').classList.toggle('active', t==='delivery');
    document.getElementById('form-delivery').style.display = t==='delivery' ? 'block' : 'none';
    updTotal();
};

window.add = (n, p) => {
    cart.push({nome: n, preco: p});
    subtotal += p;
    updTotal();
};

function updTotal() {
    let final = (tipoPedido === 'delivery') ? (subtotal + TAXA) : subtotal;
    document.getElementById('txt-total').innerText = "R$ " + final.toFixed(2).replace('.',',');
}

window.finalizar = async () => {
    if(cart.length === 0) return alert("Escolha o seu prato!");
    const pRef = push(ref(db, 'pedidos'));
    await set(pRef, {
        cliente: document.getElementById('in-name').value,
        mesa: tipoPedido==='delivery'?'Delivery':mesa,
        tipo: tipoPedido,
        itens: cart,
        total: (tipoPedido==='delivery'?subtotal+TAXA:subtotal),
        status: 'aguardando_pagamento',
        obs: document.getElementById('obs').value,
        metodoPag: document.getElementById('sel-pag').value,
        hora: new Date().toISOString()
    });
    alert("Pedido enviado com sucesso!");
    cart=[]; subtotal=0; updTotal();
};

setTimeout(()=> {
    document.getElementById('s-loading').style.display='none';
    document.getElementById('s-login').style.display='flex';
}, 1500);
</script>
</body>
</html>
